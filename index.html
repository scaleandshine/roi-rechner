<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROI-Rechner – Workshop &amp; Webinar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-glow"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">ROI</span>
    <span class="brand-text">Rechner</span>
  </div>
  <p class="brand-sub">Zeig deinem Kunden live, was in seinem Funnel unterm Strich rauskommt.</p>
</header>

<nav class="tabs" id="tabs">
  <button class="tab active" data-calc="workshop">
    <span class="tab-title">Workshop-Rechner</span>
    <span class="tab-desc">High-Ticket-Sales (mind. 2 Tage)</span>
  </button>
  <button class="tab" data-calc="webinarTermine">
    <span class="tab-title">Webinar-Rechner</span>
    <span class="tab-desc">Erstgespräche für High-Ticket</span>
  </button>
  <button class="tab" data-calc="webinarBestellformular">
    <span class="tab-title">Webinar-Rechner</span>
    <span class="tab-desc">Sales über Bestellformular</span>
  </button>
</nav>

<main class="app" id="app"></main>

<footer class="footer">
  <p>Unverbindliche Hochrechnung auf Basis deiner Angaben &amp; Branchen-Benchmarks. Kein Ersatz für eine individuelle Beratung.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
